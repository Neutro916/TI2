# T2I-Bot-Skill AI Rig - Complete Docker Compose Stack
# Includes: Frontend, Backend, OpenWebUI, Ollama, code-server, ChromaDB, and more

version: '3.8'

services:
  # Main T2I-Bot-Skill Application
  t2i-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: t2i-bot-skill
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-t2i-rig}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OLLAMA_BASE_URL=http://ollama:11434
      - LMSTUDIO_BASE_URL=http://host.docker.internal:1234
      - CHROMADB_URL=http://chromadb:8000
    volumes:
      - ./workspace:/app/workspace
      - ./config:/app/config
    networks:
      - t2i-network
    depends_on:
      - chromadb
      - ollama
    restart: unless-stopped

  # code-server (VS Code in Browser)
  codeserver:
    image: codercom/code-server:latest
    container_name: t2i-codeserver
    ports:
      - "8080:8080"
    environment:
      - PASSWORD=${CODESERVER_PASSWORD:-t2i-rig}
      - TZ=UTC
    volumes:
      - ./workspace:/home/coder/workspace
      - ./config/codeserver:/home/coder/.config/code-server
    command: --bind-addr 0.0.0.0:8080 --auth password /home/coder/workspace
    networks:
      - t2i-network
    restart: unless-stopped

  # OpenWebUI
  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: t2i-openwebui
    ports:
      - "3001:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_AUTH=true
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-your-secret-key-change-this}
      - DEFAULT_MODELS=gemma-2-9b-it,llama-3.1-8b
    volumes:
      - openwebui-data:/app/backend/data
    networks:
      - t2i-network
    depends_on:
      - ollama
    restart: unless-stopped

  # Ollama (Local LLM Runner)
  ollama:
    image: ollama/ollama:latest
    container_name: t2i-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
      - ./models:/root/models
    environment:
      - OLLAMA_MODELS=/root/.ollama/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - t2i-network
    restart: unless-stopped
    profiles:
      - gpu
      - ""

  # LM Studio Proxy (for host machine LM Studio)
  # Note: This requires LM Studio running on host with CORS enabled
  lmstudio-proxy:
    image: nginx:alpine
    container_name: t2i-lmstudio-proxy
    ports:
      - "1234:80"
    volumes:
      - ./config/nginx-lmstudio.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - t2i-network
    depends_on:
      - t2i-app
    restart: unless-stopped
    profiles:
      - lmstudio

  # ChromaDB (Vector Database for RAG)
  chromadb:
    image: chromadb/chroma:latest
    container_name: t2i-chromadb
    ports:
      - "8000:8000"
    volumes:
      - chromadb-data:/chroma/chroma
    environment:
      - CHROMA_DB_IMPL=clickhouse
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=9000
    networks:
      - t2i-network
    depends_on:
      - clickhouse
    restart: unless-stopped

  # ClickHouse (Backend for ChromaDB)
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: t2i-clickhouse
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    environment:
      - CLICKHOUSE_DB=chroma
      - CLICKHOUSE_USER=chroma
      - CLICKHOUSE_PASSWORD=chroma_password
    networks:
      - t2i-network
    restart: unless-stopped

  # Redis (Caching & Session Storage)
  redis:
    image: redis:7-alpine
    container_name: t2i-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - t2i-network
    restart: unless-stopped

  # PostgreSQL (Optional - for persistent data)
  postgres:
    image: postgres:15-alpine
    container_name: t2i-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=t2i
      - POSTGRES_USER=t2i
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-t2i-rig-password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - t2i-network
    restart: unless-stopped
    profiles:
      - database

  # Ngrok Tunnel (Optional - for public access)
  ngrok:
    image: ngrok/ngrok:latest
    container_name: t2i-ngrok
    ports:
      - "4040:4040"
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN:-}
    command: http t2i-app:3000 --log stdout
    networks:
      - t2i-network
    depends_on:
      - t2i-app
    restart: unless-stopped
    profiles:
      - tunnel

  # Cloudflared Tunnel (Alternative to ngrok)
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: t2i-cloudflared
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN:-}
    command: tunnel run
    volumes:
      - ./config/cloudflared.yml:/etc/cloudflared/config.yml:ro
    networks:
      - t2i-network
    depends_on:
      - t2i-app
    restart: unless-stopped
    profiles:
      - tunnel

  # T2I Worker (Autonomous background tasks)
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: t2i-worker
    environment:
      - NODE_ENV=production
      - WORKER_MODE=true
      - OLLAMA_BASE_URL=http://ollama:11434
      - CHROMADB_URL=http://chromadb:8000
    volumes:
      - ./workspace:/app/workspace
      - ./scripts:/app/scripts
    command: node sdk/bin/t2i-cli.js worker
    networks:
      - t2i-network
    depends_on:
      - t2i-app
      - chromadb
      - ollama
    restart: unless-stopped

networks:
  t2i-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  ollama-data:
  openwebui-data:
  chromadb-data:
  clickhouse-data:
  redis-data:
  postgres-data:
  workspace:

# Health checks
healthchecks:
  t2i-app:
    test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 40s
  
  ollama:
    test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 60s
  
  openwebui:
    test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 40s
